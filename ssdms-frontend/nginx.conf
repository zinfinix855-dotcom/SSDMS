# Define rate limiting zone (10 requests per second burst)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# In an external ALB setup, this simple port 80 block is sufficient.
# If terminating SSL natively here, uncomment the HTTPS section below.
server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # React Router fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests dynamically mapped to docker-compose limits
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_addrs;
        proxy_cache_bypass $http_upgrade;
    }

    # Cache static assets
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }
}

