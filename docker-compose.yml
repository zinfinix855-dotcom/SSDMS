version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ssdms
      MYSQL_ROOT_PASSWORD: Ssdms@2026
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ssdms-net

  redis:
    image: redis:6-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - redis_data:/data
    networks:
      - ssdms-net

  backend:
    build: 
      context: ./ssdms-backend
      dockerfile: Dockerfile
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: Ssdms@2026
      DB_NAME: ssdms
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: super_secret_jwt_key_ssdms_2026
      JWT_REFRESH_SECRET: super_secret_refresh_key_ssdms_2026
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - db
      - redis
    volumes:
      - ./ssdms-backend/uploads:/app/uploads
    networks:
      - ssdms-net

  frontend:
    build: 
      context: ./ssdms-frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api/v1
    networks:
      - ssdms-net

volumes:
  mysql_data:
  redis_data:

networks:
  ssdms-net:
    driver: bridge
