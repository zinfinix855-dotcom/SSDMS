services:
  # ── Database Layer ──
  db:
    image: mysql:8.0
    container_name: ssdms-db
    restart: always
    environment:
      MYSQL_DATABASE: ssdms_enterprise
      MYSQL_ROOT_PASSWORD: root_password_change_me
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # ── Caching & Background Layer ──
  redis:
    image: redis:7-alpine
    container_name: ssdms-redis
    restart: always
    ports:
      - "6380:6379"

  # ── Application Backend ──
  backend:
    build: ./ssdms-backend
    container_name: ssdms-api
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root_password_change_me
      DB_NAME: ssdms_enterprise
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      BINDEX_SALT: ${BINDEX_SALT}
    depends_on:
      - db
      - redis
    ports:
      - "5000:5000"

  # ── Application Frontend ──
  frontend:
    build: ./ssdms-frontend
    container_name: ssdms-ui
    restart: always
    environment:
      VITE_API_URL: http://backend:5000/api/v1
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
